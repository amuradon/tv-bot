steps:
  # 1. Krok: Maven Build (vytvoření JAR)
  # Používáme oficiální Maven obraz. Výsledek se uloží do sdíleného /workspace/target
  - name: 'registry.access.redhat.com/ubi8/openjdk-21:1.23'
    entrypoint: '/bin/bash'
    args:
      - '-ceux'
      - |
        chmod +x mvnw && ./mvnw package -DskipTests

options:
  logging: CLOUD_LOGGING_ONLY